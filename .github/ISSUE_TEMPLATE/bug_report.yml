name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect Freighter wallet
        2. Navigate to /deposit
        3. Enter amount '10'
        4. Click 'Deposit' → error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output / error message
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (UI/UX)
        - ZK proof generation
        - Soroban contract
        - Circom circuit
        - Scripts / setup
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + Freighter version
      placeholder: e.g. Chrome 125, Freighter 5.3.0
